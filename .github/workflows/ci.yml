name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  checks: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
